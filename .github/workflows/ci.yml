name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @kal-ai/core build

      - name: Typecheck
        run: |
          pnpm --filter @kal-ai/core typecheck
          pnpm --filter @kal-ai/engine typecheck

      - name: Build studio
        run: pnpm --filter studio build

      - name: Build engine
        run: pnpm --filter @kal-ai/engine build

      - name: Test
        run: |
          pnpm --filter @kal-ai/core test
          pnpm --filter @kal-ai/engine test
